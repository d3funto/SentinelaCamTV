<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="620" viewBox="0 0 1000 620">
  <defs>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7CE7FF"/>
      <stop offset="1" stop-color="#27D3FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.38"/>
    </filter>

    <symbol id="banner-v2" viewBox="0 0 520 292">
      <rect x="0" y="0" width="520" height="292" rx="0" fill="#071821" stroke="#27D3FF" stroke-width="5"/>

      <!-- Grid width: 454. Left/right aligned at x=32 and x=486. -->
      <!-- Top row: 3 equal tiles, width 138, gap 20. -->
      <rect x="32" y="34" width="138" height="82" fill="#122F3B" stroke="#7CE7FF" stroke-width="4"/>
      <rect x="190" y="34" width="138" height="82" fill="#122F3B" stroke="#7CE7FF" stroke-width="4"/>
      <rect x="348" y="34" width="138" height="82" fill="#122F3B" stroke="#7CE7FF" stroke-width="4"/>

      <!-- Bottom row: 2 equal tiles, width 217, gap 20. -->
      <rect x="32" y="148" width="217" height="96" fill="#122F3B" stroke="#7CE7FF" stroke-width="4"/>
      <rect x="269" y="148" width="217" height="96" fill="#122F3B" stroke="#7CE7FF" stroke-width="4"/>

      <path d="M190 196 C224 142, 296 142, 330 196 C296 250, 224 250, 190 196 Z"
        fill="#071821" stroke="url(#cyan)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="260" cy="196" r="24" fill="#27D3FF"/>
      <circle cx="260" cy="196" r="10" fill="#071821"/>
      <circle cx="270" cy="186" r="4" fill="#BDF4FF"/>
    </symbol>
  </defs>

  <rect width="1000" height="620" fill="#041017"/>
  <text x="60" y="62" font-family="Arial, sans-serif" font-size="32" fill="#EAF8FC" font-weight="700">Banner opcao 1 - v2</text>
  <text x="60" y="96" font-family="Arial, sans-serif" font-size="18" fill="#AED0D9">Mesmo estilo da opcao 1 original, com fileiras alinhadas nas bordas esquerda e direita.</text>

  <text x="60" y="150" font-family="Arial, sans-serif" font-size="20" fill="#EAF8FC" font-weight="700">Previa grande</text>
  <g transform="translate(60 178)" filter="url(#shadow)">
    <use href="#banner-v2" width="780" height="438"/>
  </g>

  <text x="60" y="530" font-family="Arial, sans-serif" font-size="16" fill="#AED0D9">Medidas: cima 3x 138 com gap 20; baixo 2x 217 com gap 20; ambas de x=32 ate x=486.</text>
</svg>
